<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TSCS v2.0 业务流程演示</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<style>
:root {
  --sidebar-bg: #1a1f36;
  --sidebar-hover: #252b48;
  --sidebar-active: #3a4099;
  --main-bg: #f0f2f8;
  --card-bg: #ffffff;
  --text-primary: #1a1f36;
  --text-secondary: #5a6380;
  --text-light: #a0a8c0;
  --accent-blue: #4f6ef7;
  --accent-orange: #ff7c43;
  --accent-green: #2ecda7;
  --accent-red: #ff5757;
  --accent-purple: #9b59f3;
  --border: #e2e6f0;
  --shadow: 0 4px 24px rgba(26,31,54,0.08);
  --radius: 12px;
  --sidebar-width: 260px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Noto Sans SC', -apple-system, sans-serif;
  background: var(--main-bg);
  color: var(--text-primary);
  min-height: 100vh;
  display: flex;
}
::selection { background: var(--accent-blue); color: #fff; }

/* ===== SIDEBAR ===== */
.sidebar {
  width: var(--sidebar-width);
  min-height: 100vh;
  background: var(--sidebar-bg);
  display: flex;
  flex-direction: column;
  position: fixed;
  left: 0; top: 0;
  z-index: 100;
  overflow-y: auto;
}
.sidebar-logo {
  padding: 28px 24px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.07);
}
.sidebar-logo h1 {
  font-size: 20px;
  font-weight: 700;
  color: #fff;
  letter-spacing: 1px;
}
.sidebar-logo span {
  font-size: 11px;
  color: rgba(255,255,255,0.4);
  letter-spacing: 2px;
  text-transform: uppercase;
}
.sidebar-nav {
  padding: 16px 12px;
  flex: 1;
}
.nav-label {
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.3);
  padding: 8px 12px 4px;
  margin-top: 8px;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 11px 14px;
  border-radius: 8px;
  color: rgba(255,255,255,0.65);
  cursor: pointer;
  transition: all 0.2s;
  font-size: 14px;
  font-weight: 400;
  user-select: none;
  border: 1px solid transparent;
}
.nav-item:hover {
  background: var(--sidebar-hover);
  color: #fff;
}
.nav-item.active {
  background: var(--sidebar-active);
  color: #fff;
  font-weight: 500;
  border-color: rgba(255,255,255,0.1);
}
.nav-item .icon {
  width: 20px; height: 20px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  opacity: 0.8;
}
.nav-item .step-count {
  margin-left: auto;
  font-size: 11px;
  background: rgba(255,255,255,0.1);
  padding: 1px 7px;
  border-radius: 10px;
}
.sidebar-footer {
  padding: 16px 24px;
  border-top: 1px solid rgba(255,255,255,0.07);
  font-size: 11px;
  color: rgba(255,255,255,0.25);
}

/* ===== MAIN CONTENT ===== */
.main {
  margin-left: var(--sidebar-width);
  flex: 1;
  padding: 32px 40px;
  min-height: 100vh;
}
.page-header {
  margin-bottom: 28px;
}
.page-header h2 {
  font-size: 26px;
  font-weight: 700;
  color: var(--text-primary);
  line-height: 1.3;
}
.page-header p {
  font-size: 14px;
  color: var(--text-secondary);
  margin-top: 4px;
}

/* ===== FLOWCHART CARD ===== */
.flow-card {
  background: var(--card-bg);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 28px;
  margin-bottom: 24px;
  border: 1px solid var(--border);
  transition: opacity 0.3s;
}
.flow-card h3 {
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.flow-card h3::before {
  content: '';
  width: 3px; height: 16px;
  background: var(--accent-blue);
  border-radius: 2px;
}
.flow-diagram {
  overflow-x: auto;
  padding: 10px 0;
}
.flow-diagram svg {
  max-width: 100%;
  display: block;
}

/* ===== TABS ===== */
.tab-bar {
  display: flex;
  gap: 6px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.tab-btn {
  padding: 8px 18px;
  border-radius: 20px;
  border: 1.5px solid var(--border);
  background: var(--card-bg);
  color: var(--text-secondary);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
}
.tab-btn:hover { border-color: var(--accent-blue); color: var(--accent-blue); }
.tab-btn.active {
  background: var(--accent-blue);
  border-color: var(--accent-blue);
  color: #fff;
}

/* ===== STEP CARDS ===== */
.steps-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}
.step-card {
  background: var(--card-bg);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  padding: 20px;
  cursor: pointer;
  transition: all 0.25s;
  position: relative;
  overflow: hidden;
}
.step-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--accent-blue);
}
.step-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(26,31,54,0.14);
}
.step-card.highlight::before {
  background: var(--accent-orange);
}
.step-card-header {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 10px;
}
.step-num {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--accent-blue);
  color: #fff;
  font-size: 12px;
  font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.step-card.highlight .step-num { background: var(--accent-orange); }
.step-card-title {
  font-size: 14px;
  font-weight: 600;
  line-height: 1.4;
}
.step-card-sub {
  font-size: 12px;
  color: var(--text-secondary);
  line-height: 1.6;
  padding-left: 40px;
}
.step-card-sub span {
  display: block;
}
.step-tag {
  display: inline-block;
  padding: 1px 8px;
  border-radius: 10px;
  font-size: 10px;
  font-weight: 500;
  margin-top: 6px;
}
.tag-blue { background: #eef0ff; color: #4f6ef7; }
.tag-orange { background: #fff1ea; color: #ff7c43; }
.tag-green { background: #e8faf5; color: #2ecda7; }
.tag-red { background: #ffeaea; color: #ff5757; }
.tag-purple { background: #f5efff; color: #9b59f3; }

/* ===== DETAIL PANEL ===== */
.detail-panel {
  background: var(--card-bg);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  overflow: hidden;
  transition: all 0.3s;
  margin-bottom: 24px;
}
.detail-panel.hidden { display: none; }
.detail-header {
  padding: 20px 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.detail-header h4 {
  font-size: 16px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 10px;
}
.detail-close {
  width: 28px; height: 28px;
  border-radius: 50%;
  border: none;
  background: var(--main-bg);
  cursor: pointer;
  font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-secondary);
  transition: all 0.2s;
}
.detail-close:hover { background: var(--accent-red); color: #fff; }
.detail-body {
  padding: 24px;
}
.detail-section {
  margin-bottom: 20px;
}
.detail-section:last-child { margin-bottom: 0; }
.detail-section h5 {
  font-size: 12px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text-light);
  margin-bottom: 8px;
  font-weight: 500;
}
.detail-actors {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.actor-chip {
  padding: 4px 12px;
  border-radius: 20px;
  background: var(--main-bg);
  font-size: 13px;
  border: 1px solid var(--border);
}
.detail-rules {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.rule-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  background: var(--main-bg);
  border-radius: 8px;
  font-size: 13px;
}
.rule-item .rule-label { color: var(--text-secondary); }
.rule-item .rule-value { font-weight: 600; color: var(--text-primary); }
.sub-steps {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.sub-step {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
  padding: 6px 10px;
  border-radius: 6px;
  background: var(--main-bg);
}
.sub-step::before {
  content: '→';
  color: var(--accent-blue);
  font-weight: 700;
}

/* ===== CASE CARD ===== */
.case-card {
  background: linear-gradient(135deg, var(--sidebar-bg), #2a3270);
  border-radius: var(--radius);
  padding: 20px 24px;
  color: #fff;
  margin-bottom: 24px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 16px;
}
.case-card .label { font-size: 11px; opacity: 0.5; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 2px; }
.case-card .value { font-size: 15px; font-weight: 600; }
.status-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 3px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
  background: rgba(255,255,255,0.15);
}
.status-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent-green);
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* ===== CALCULATOR ===== */
.calc-card {
  background: var(--card-bg);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  padding: 24px;
}
.calc-card h4 {
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.calc-formula {
  background: var(--main-bg);
  border-radius: 8px;
  padding: 12px 16px;
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 20px;
  border-left: 3px solid var(--accent-blue);
  line-height: 1.8;
}
.calc-formula strong { color: var(--accent-blue); }
.calc-inputs {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 16px;
  margin-bottom: 20px;
}
.calc-field label {
  font-size: 12px;
  color: var(--text-secondary);
  display: block;
  margin-bottom: 6px;
  font-weight: 500;
}
.calc-field input[type="range"] {
  width: 100%;
  margin-bottom: 4px;
  accent-color: var(--accent-blue);
}
.calc-field .range-val {
  font-size: 13px;
  font-weight: 600;
  color: var(--accent-blue);
}
.calc-result {
  background: linear-gradient(135deg, #eef0ff, #f5f0ff);
  border-radius: 10px;
  padding: 16px 20px;
  text-align: center;
}
.calc-result .result-label {
  font-size: 12px;
  color: var(--text-secondary);
  margin-bottom: 4px;
}
.calc-result .result-value {
  font-size: 32px;
  font-weight: 700;
  color: var(--accent-blue);
}
.calc-breakdown {
  margin-top: 12px;
  font-size: 12px;
  color: var(--text-secondary);
  text-align: left;
}
.calc-breakdown div { padding: 2px 0; }

/* ===== FULL FLOW OVERVIEW ===== */
.overview-flow {
  background: var(--card-bg);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  padding: 24px;
  overflow-x: auto;
}
.overview-flow h3 {
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 16px;
}
.flow-nodes {
  display: flex;
  align-items: center;
  gap: 0;
  flex-wrap: nowrap;
  min-width: 800px;
}
.flow-node {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
  cursor: pointer;
  transition: transform 0.2s;
}
.flow-node:hover { transform: scale(1.05); }
.flow-node-box {
  padding: 8px 12px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 500;
  white-space: nowrap;
  border: 2px solid;
}
.flow-node-box.cat-entry { background: #e8edff; border-color: #4f6ef7; color: #4f6ef7; }
.flow-node-box.cat-core { background: #fff1ea; border-color: #ff7c43; color: #e06020; }
.flow-node-box.cat-end { background: #e8faf5; border-color: #2ecda7; color: #1a9a7a; }
.flow-node-box.cat-error { background: #ffeaea; border-color: #ff5757; color: #cc3333; }
.flow-node-box.cat-special { background: #f5efff; border-color: #9b59f3; color: #7a3ecf; }
.flow-node-num {
  font-size: 10px;
  color: var(--text-light);
}
.flow-arrow {
  font-size: 16px;
  color: var(--text-light);
  flex-shrink: 0;
  padding: 0 4px;
}
.highlight-flow .flow-node-box { box-shadow: 0 0 0 3px rgba(255,124,67,0.4); }

/* ===== TRANSITIONS ===== */
.fade-enter { opacity: 0; transform: translateY(8px); }
.fade-enter-active { opacity: 1; transform: translateY(0); transition: all 0.3s ease; }

/* ===== RESPONSIVE ===== */
@media (max-width: 900px) {
  .sidebar { width: 200px; }
  .main { margin-left: 200px; padding: 20px; }
  .steps-grid { grid-template-columns: 1fr; }
  .case-card { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 600px) {
  .sidebar { display: none; }
  .main { margin-left: 0; padding: 16px; }
}
</style>
</head>

<main class="main" id="mainContent">

<script>
// ===== DATA =====
const PROCESS_DATA = {

      {

// ===== RENDER =====
function renderPage(tabId) {
  const main = document.getElementById('mainContent');
  const data = PROCESS_DATA[tabId];
  if (!data) return;

  let html = `<div class="page-header">
    <h2>${data.title}</h2>
    <p>${data.desc}</p>
  </div>`;

  // Case card for huzhu
  if (tabId === 'huzhu' || tabId === 'overview') {
    html += renderCaseCard();
  }

  if (tabId === 'overview') {
    html += data.render();
    main.innerHTML = html;
    initMermaid();
    return;
  }

  // Steps
  if (data.steps) {
    html += `<div class="steps-grid" id="stepsGrid">`;
    data.steps.forEach((step, i) => {
      html += `<div class="step-card" data-step="${i}" onclick="openDetail('${tabId}', ${i})">
        <div class="step-card-header">
          <div class="step-num">${step.num}</div>
          <div>
            <div class="step-card-title">${step.title}</div>
            <span class="step-tag ${step.tag}">${step.tagText}</span>
          </div>
        </div>
        <div class="step-card-sub">${step.sub}</div>
      </div>`;
    });
    html += `</div>`;
  }

  // Calculator for huzhu
  if (tabId === 'huzhu') {
    html += renderCalculator();
  }

  main.innerHTML = html;

  // Scroll top
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

    </div>`;
}

function renderCalculator() {
  return `
    <div class="calc-card">
      <h4>💰 互助给付理算计算器</h4>
      <div class="calc-formula">
        <strong>互助给付额</strong> = ( 损失额 × 责任比例 − 免给付额 ) × ( 1 − 协议扣除比例 )
      </div>
      <div class="calc-inputs">
        <div class="calc-field">
          <label>损失额（元）</label>
          <input type="range" id="lossAmt" min="500" max="50000" value="15800" step="100" oninput="calcResult()">
          <div class="range-val">¥<span id="lossAmtVal">15,800</span></div>
        </div>
        <div class="calc-field">
          <label>责任比例（%）</label>
          <input type="range" id="respRate" min="0" max="100" value="70" step="5" oninput="calcResult()">
          <div class="range-val"><span id="respRateVal">70</span>%</div>
        </div>
        <div class="calc-field">
          <label>免给付额（元）</label>
          <input type="range" id="exemptAmt" min="0" max="2000" value="500" step="50" oninput="calcResult()">
          <div class="range-val">¥<span id="exemptAmtVal">500</span></div>
        </div>
        <div class="calc-field">
          <label>协议扣除比例（%）</label>
          <input type="range" id="deductRate" min="0" max="30" value="10" step="1" oninput="calcResult()">
          <div class="range-val"><span id="deductRateVal">10</span>%</div>
        </div>
      </div>
      <div class="calc-result">
        <div class="result-label">预计互助给付金额</div>
        <div class="result-value" id="calcResultVal">¥9,504</div>
        <div class="calc-breakdown" id="calcBreakdown"></div>
      </div>
    </div>`;
}

// ===== CALCULATOR LOGIC =====
function calcResult() {
  const loss = parseFloat(document.getElementById('lossAmt').value);
  const resp = parseFloat(document.getElementById('respRate').value) / 100;
  const exempt = parseFloat(document.getElementById('exemptAmt').value);
  const deduct = parseFloat(document.getElementById('deductRate').value) / 100;

  document.getElementById('lossAmtVal').textContent = loss.toLocaleString();
  document.getElementById('respRateVal').textContent = Math.round(resp * 100);
  document.getElementById('exemptAmtVal').textContent = exempt.toLocaleString();
  document.getElementById('deductRateVal').textContent = Math.round(deduct * 100);

  const afterResp = loss * resp - exempt;
  const afterDeduct = afterResp * (1 - deduct);
  const final = Math.max(0, afterDeduct);

  document.getElementById('calcResultVal').textContent = '¥' + Math.round(final).toLocaleString();

  const breakdown = document.getElementById('calcBreakdown');
  breakdown.innerHTML = `
    <div>① 损失额 × 责任比例 = ¥${loss.toLocaleString()} × ${Math.round(resp*100)}% = <strong>¥${(loss*resp).toLocaleString()}</strong></div>
    <div>② ① − 免给付额 = <strong>¥${(loss*resp - exempt).toLocaleString()}</strong></div>
    <div>③ ② × (1 − 扣除比例) = <strong>¥${(loss*resp - exempt).toLocaleString()}</strong> × ${Math.round((1-deduct)*100)}% = <strong style="color:#4f6ef7">¥${Math.round(final).toLocaleString()}</strong></div>
  `;

  // Approval level
  let level = '系统自动审批';
  if (final > 100000) level = '总经理审批';
  else if (final > 50000) level = '经理审批';
  else if (final > 2000) level = '企业确认';
  breakdown.innerHTML += `<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border);">📋 审批级别：<strong>${level}</strong></div>`;
}

// ===== DETAIL PANEL =====
function openDetail(tabId, stepIndex) {
  const data = PROCESS_DATA[tabId];
  if (!data || !data.steps) return;
  const step = data.steps[stepIndex];

  // Mark active step
  document.querySelectorAll('.step-card').forEach(c => c.classList.remove('highlight'));
  document.querySelector(`.step-card[data-step="${stepIndex}"]`).classList.add('highlight');

  const actorsHtml = step.actors.map(a => `<span class="actor-chip">👤 ${a}</span>`).join('');
  const rulesHtml = step.rules.map(r => `<div class="rule-item"><span class="rule-label">•</span><span class="rule-value">${r}</span></div>`).join('');
  const subStepsHtml = step.subSteps.map(s => `<div class="sub-step">${s}</div>`).join('');

  const detail = document.getElementById('detailPanel');
  if (!detail) {
    const grid = document.getElementById('stepsGrid');
    const panel = document.createElement('div');
    panel.className = 'detail-panel';
    panel.id = 'detailPanel';
    panel.innerHTML = `
      <div class="detail-header">
        <h4><span class="step-tag ${step.tag}">${step.tagText}</span> ${step.title}</h4>
        <button class="detail-close" onclick="closeDetail()">✕</button>
      </div>
      <div class="detail-body">
        <div class="detail-section">
          <h5>步骤描述</h5>
          <p style="font-size:13px;color:var(--text-secondary);line-height:1.7">${step.sub}</p>
        </div>
        <div class="detail-section">
          <h5>参与角色</h5>
          <div class="detail-actors">${actorsHtml}</div>
        </div>
        <div class="detail-section">
          <h5>业务规则 / 阈值</h5>
          <div class="detail-rules">${rulesHtml}</div>
        </div>
        <div class="detail-section">
          <h5>子步骤分解</h5>
          <div class="sub-steps">${subStepsHtml}</div>
        </div>
      </div>
    `;
    grid.insertAdjacentElement('afterend', panel);
    panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  } else {
    detail.innerHTML = `
      <div class="detail-header">
        <h4><span class="step-tag ${step.tag}">${step.tagText}</span> ${step.title}</h4>
        <button class="detail-close" onclick="closeDetail()">✕</button>
      </div>
      <div class="detail-body">
        <div class="detail-section">
          <h5>步骤描述</h5>
          <p style="font-size:13px;color:var(--text-secondary);line-height:1.7">${step.sub}</p>
        </div>
        <div class="detail-section">
          <h5>参与角色</h5>
          <div class="detail-actors">${actorsHtml}</div>
        </div>
        <div class="detail-section">
          <h5>业务规则 / 阈值</h5>
          <div class="detail-rules">${rulesHtml}</div>
        </div>
        <div class="detail-section">
          <h5>子步骤分解</h5>
          <div class="sub-steps">${subStepsHtml}</div>
        </div>
      </div>
    `;
    detail.classList.remove('hidden');
    detail.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

function closeDetail() {
  const panel = document.getElementById('detailPanel');
  if (panel) panel.classList.add('hidden');
  document.querySelectorAll('.step-card').forEach(c => c.classList.remove('highlight'));
}

// ===== OVERVIEW NODE DETAIL =====
function showNodeDetail(nodeName) {
  const info = NODE_DETAILS[nodeName];
  if (!info) return;
  const actorsHtml = info.actors.map(a => `<span class="actor-chip">👤 ${a}</span>`).join('');
  const rulesHtml = info.rules.map(r => `<div class="rule-item"><span class="rule-label">•</span><span class="rule-value">${r}</span></div>`).join('');

  document.getElementById('nodeDetail').innerHTML = `
    <div class="detail-panel">
      <div class="detail-header">

          <div class="detail-actors">${actorsHtml}</div>

          <h5>关键规则</h5>
          <div class="detail-rules">${rulesHtml}</div>

// ===== TAB SWITCHING =====
function switchTab(tabId, el) {
  // Update nav
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  if (el) el.classList.add('active');
  // Render
  renderPage(tabId);
}

  if (typeof mermaid !== 'undefined') {
    mermaid.init({ theme: 'base', themeVariables: {
      primaryColor: '#e8edff',
      primaryTextColor: '#4f6ef7',
      primaryBorderColor: '#4f6ef7',

    }}, document.querySelector('.mermaid'));

}

document.addEventListener('DOMContentLoaded', () => {
